services:
  emerald-exchange:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: emerald-exchange
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "8100:8000"
    volumes:
      - ~/.config/agent-utilities:/root/.config/agent-utilities:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import emerald_exchange"]
      interval: 30s
      timeout: 10s
      retries: 3
