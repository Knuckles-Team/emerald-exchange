services:
  emerald-exchange:
    init: true
    user: "10001:10001"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: ${MCP_CONTAINER_MEMORY_LIMIT:-2g}
    cpus: ${MCP_CONTAINER_CPU_LIMIT:-1.0}
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: emerald-exchange
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:8100:8000"
    volumes:
      - ${AGENT_UTILITIES_CONFIG_DIR:?set AGENT_UTILITIES_CONFIG_DIR}:/tmp/.config/agent-utilities:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import emerald_exchange"]
      interval: 30s
      timeout: 10s
      retries: 3
